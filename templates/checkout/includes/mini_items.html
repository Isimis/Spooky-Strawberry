{% load catalog_extras %}
<div style="margin:4px 0 10px">
    {% for item in items %}
    <div style="display:flex;gap:10px;align-items:center;padding:6px 0">
        {% if item.image %}<img src="{{ item.image.image.url }}" style="width:44px;height:44px;border-radius:9px;object-fit:cover" alt="">{% else %}<div style="width:44px;height:44px;border-radius:9px;background:var(--blush)"></div>{% endif %}
        <div style="flex:1;min-width:0"><div style="font-size:12.5px;font-weight:600;line-height:1.25">{{ item.product.name }}</div><div style="font-size:11.5px;color:var(--muted)">{{ item.quantity }} szt.</div></div>
        <span style="font-size:13px;font-weight:700;white-space:nowrap">{{ item.line_total|money }}</span>
    </div>
    {% endfor %}
</div>
